name: Build source code and test it

on:
  push:
    branches:
      - renovate/**
  pull_request:
    branches: [ main ]
  workflow_call:  # Allow this workflow to be called by other workflows

jobs:
  guard_swiftpm_version:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Enforce capacitor-swift-pm version
        run: |
          set -euo pipefail
          if ! grep -Eq 'https://github.com/ionic-team/capacitor-swift-pm\.git"[[:space:]]*,[[:space:]]*from:[[:space:]]*"8\.0\.0"' Package.swift; then
            echo "Expected capacitor-swift-pm to be pinned to 8.0.0 in Package.swift"
            exit 1
          fi
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Build
        id: build_code
        run: bun run verify:android
  example_app_android_maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install plugin dependencies
        run: bun i
      - name: Build plugin
        run: bun run build
      - name: Install example app dependencies
        working-directory: example-app
        run: bun i
      - name: Build example app
        working-directory: example-app
        run: bun run build
      - name: Sync Android shell
        working-directory: example-app
        run: bunx cap sync android
      - name: Build debug APK
        working-directory: example-app/android
        run: ./gradlew assembleDebug
      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Run Maestro smoke tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          script: |
            adb install -r example-app/android/app/build/outputs/apk/debug/app-debug.apk
            maestro test example-app/maestro/ci-smoke-test-plan.yaml
  example_app_ios_maestro:
    runs-on: macOS-latest
    timeout-minutes: 45
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Install plugin dependencies
        run: bun i
      - name: Build plugin
        run: bun run build
      - name: Install example app dependencies
        working-directory: example-app
        run: bun i
      - name: Build example app
        working-directory: example-app
        run: bun run build
      - name: Sync iOS shell
        working-directory: example-app
        run: bunx cap sync ios
      - name: Build and install app on iOS simulator
        working-directory: example-app/ios/App
        run: |
          xcrun simctl boot "iPhone 16" || true
          xcrun simctl bootstatus "iPhone 16" -b
          xcodebuild \
            -scheme App \
            -configuration Debug \
            -derivedDataPath build \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO
          xcrun simctl install booted build/Build/Products/Debug-iphonesimulator/App.app
      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Run Maestro smoke tests on iOS simulator
        run: maestro test example-app/maestro/ci-smoke-test-plan.yaml
  build_ios:
    runs-on: macOS-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Build
        id: build_code
        run: bun run verify:ios
  web:
    runs-on: ubuntu-latest
    name: 'Build code and test'
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        id: install_code
        run: bun i
      - name: Lint
        id: lint_code
        run: bun run lint
      - name: Build
        id: build_code
        run: bun run build
      - name: Verify
        id: verify_code
        run: bun run verify:web

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@capgo/native-purchases Example</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>@capgo/native-purchases Example</h1>
      <p class="lead">Run native plugin APIs with the source linked locally.</p>
      <p class="action-picker-label">Available actions</p>
      <div id="action-buttons" class="action-buttons" data-testid="action-buttons"></div>
      <select id="action-select" data-testid="action-select" hidden></select>
      <div id="action-description" class="action-description"></div>
      <div id="action-form" class="form-grid"></div>
      <button id="run-action" data-testid="run-action">Run action</button>
      <pre id="plugin-output" data-testid="plugin-output">Select an action to begin.</pre>
      <h2>Transaction Events</h2>
      <pre id="event-log" data-testid="event-log">Listeners not registered yet.</pre>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
